# Triggered by version tags — creates a GitHub Release and publishes to npm
name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Create GitHub Release & Publish
    if: github.repository == 'grMLEqomlkkU5Eeinz4brIrOVCUCkJuN/hantaviruswrapper'
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm test

      - run: npm run build

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true

      - run: npm publish --provenance --access public
