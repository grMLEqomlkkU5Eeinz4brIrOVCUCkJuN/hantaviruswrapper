# Manual publish to npm without creating a GitHub Release (e.g. re-publish, hotfix)
name: Publish to npm

on:
  workflow_dispatch:

jobs:
  publish:
    name: Publish
    if: github.repository == 'grMLEqomlkkU5Eeinz4brIrOVCUCkJuN/hantaviruswrapper'
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm test

      - run: npm run build

      - run: npm publish --provenance --access public
